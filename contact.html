<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Servo Control - Simple</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #999;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .ip-section {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .ip-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: monospace;
            margin-bottom: 10px;
        }

        .connect-btn {
            width: 100%;
            padding: 10px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .connect-btn:hover {
            background: #5568d3;
        }

        .status {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }

        .status.connected {
            color: #4CAF50;
            font-weight: bold;
        }

        .control-section {
            margin-top: 30px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .control-btn {
            padding: 20px 30px;
            font-size: 20px;
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            max-width: 150px;
        }

        .left-btn {
            background: #FF6B6B;
            color: white;
        }

        .left-btn:hover {
            background: #FF5252;
            transform: scale(1.05);
        }

        .left-btn:active {
            transform: scale(0.95);
        }

        .right-btn {
            background: #4CAF50;
            color: white;
        }

        .right-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .right-btn:active {
            transform: scale(0.95);
        }

        .position-display {
            margin-top: 30px;
            font-size: 16px;
            color: #333;
        }

        .angle {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            font-family: monospace;
        }

        .help {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;
            font-size: 12px;
            color: #856404;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Servo Control</h1>
        <p class="subtitle">MG90S Micro Servo</p>

        <div class="ip-section">
            <input 
                type="text" 
                class="ip-input" 
                id="picoIP" 
                placeholder="192.168.1.100"
                value="172.20.10.4"
            >
            <button class="connect-btn" onclick="connect()">Connect</button>
            <div class="status" id="status">Not connected</div>
        </div>

        <div class="control-section">
            <div class="button-group">
                <button class="control-btn left-btn" onclick="rotateLeft()">← LEFT</button>
                <button class="control-btn right-btn" onclick="rotateRight()">RIGHT →</button>
            </div>
        </div>

        <div class="position-display">
            Position: <span class="angle" id="angle">90°</span>
        </div>

        <div class="help">
            <strong>How to use:</strong><br>
            1. Enter Pico IP and click Connect<br>
            2. Click LEFT or RIGHT to rotate servo<br>
            3. Each click = 45° movement
        </div>
    </div>

    <script>
        let currentAngle = 90;
        let picoIP = "172.20.10.4";
        let isConnected = false;

        function connect() {
            picoIP = document.getElementById("picoIP").value.trim();
            if (!picoIP) {
                alert("Enter IP address");
                return;
            }

            const url = `http://${picoIP}/`;
            fetch(url)
                .then(r => r.json())
                .then(d => {
                    isConnected = true;
                    document.getElementById("status").classList.add("connected");
                    document.getElementById("status").textContent = "✓ Connected";
                    alert("Connected!");
                })
                .catch(e => {
                    isConnected = false;
                    document.getElementById("status").classList.remove("connected");
                    document.getElementById("status").textContent = "✗ Not connected";
                    alert("Cannot connect to " + picoIP);
                });
        }

        function rotateLeft() {
            if (!isConnected) {
                alert("Connect first!");
                return;
            }
            
            currentAngle = Math.max(0, currentAngle - 45);
            moveServo(currentAngle);
        }

        function rotateRight() {
            if (!isConnected) {
                alert("Connect first!");
                return;
            }
            
            currentAngle = Math.min(180, currentAngle + 45);
            moveServo(currentAngle);
        }

        function moveServo(angle) {
            const url = `http://${picoIP}/move?angle=${angle}`;
            
            fetch(url)
                .then(r => r.json())
                .then(d => {
                    document.getElementById("angle").textContent = angle + "°";
                    console.log("Moved to " + angle + "°");
                })
                .catch(e => {
                    console.error("Error:", e);
                    isConnected = false;
                    document.getElementById("status").textContent = "✗ Disconnected";
                });
        }
    </script>
</body>
</html>
